name: CI/CD-Python-Demo  # 流水线名称

# 触发条件：当代码推送到main分支、或创建Pull Request时，自动运行流水线
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# 定义流水线任务
jobs:
  test:  # 任务名
    runs-on: ubuntu-latest  # 运行环境（GitHub提供的免费虚拟机）
    steps:
      # 步骤1：拉取你的仓库代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 步骤2：安装Python环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'  # 和你本地Python版本一致即可

      # 步骤3：安装依赖（这里我们只需要pytest来运行测试）
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      # 步骤4：运行单元测试
      - name: Run unit tests
        run: |
          pytest test_app.py -v
